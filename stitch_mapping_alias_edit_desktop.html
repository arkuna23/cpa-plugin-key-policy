<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Courier+Prime&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "text-primary": "#2d2a26",
                        "surface-tint": "#625e58",
                        "surface-bright": "#fdf8f7",
                        "on-background": "#1c1b1b",
                        "on-primary": "#ffffff",
                        "warn": "#e0aa14",
                        "secondary-fixed": "#e4e2dc",
                        "ok": "#10b981",
                        "inverse-on-surface": "#f4f0ee",
                        "surface-variant": "#e6e2e0",
                        "accent-2": "#7f7a74",
                        "outline": "#7c766e",
                        "on-tertiary-fixed": "#1c1b1e",
                        "border": "#e3e1db",
                        "primary": "#5f5b56",
                        "on-secondary-fixed-variant": "#474743",
                        "on-primary-fixed": "#1e1b17",
                        "text-muted": "#6d6760",
                        "on-surface-variant": "#4b463f",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#1b1c18",
                        "outline-variant": "#cdc5bc",
                        "tertiary-fixed-dim": "#c8c5c9",
                        "surface-container-high": "#ebe7e6",
                        "on-tertiary-container": "#fffbff",
                        "primary-fixed": "#e8e1da",
                        "secondary-fixed-dim": "#c8c6c1",
                        "on-tertiary-fixed-variant": "#474649",
                        "error": "#ba1a1a",
                        "danger": "#c65746",
                        "primary-fixed-dim": "#ccc5bf",
                        "inverse-surface": "#31302f",
                        "on-primary-fixed-variant": "#4a4641",
                        "surface-container-highest": "#e6e2e0",
                        "on-tertiary": "#ffffff",
                        "border-hover": "#cecac4",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary": "#5d5b5e",
                        "secondary-container": "#e4e2dc",
                        "border-strong": "#d5d2cb",
                        "on-secondary-container": "#656560",
                        "background": "#fdf8f7",
                        "accent-3": "#726d67",
                        "row-hover": "rgba(139,134,128,0.06)",
                        "primary-container": "#78746e",
                        "on-error-container": "#93000a",
                        "danger-soft": "rgba(198,87,70,0.08)",
                        "page-bg": "#faf9f5",
                        "on-surface": "#1c1b1b",
                        "on-primary-container": "#fffbff",
                        "surface-container-lowest": "#ffffff",
                        "accent-ring": "rgba(139,134,128,0.18)",
                        "surface-container": "#f1edeb",
                        "tertiary-container": "#767477",
                        "surface": "#ffffff",
                        "surface-dim": "#ddd9d8",
                        "inverse-primary": "#ccc5bf",
                        "accent-soft": "rgba(139,134,128,0.12)",
                        "tertiary-fixed": "#e5e1e5",
                        "surface-container-low": "#f7f3f1",
                        "secondary": "#5f5f5a",
                        "ok-soft": "rgba(16,185,129,0.08)",
                        "scrim": "rgba(45,42,38,0.35)",
                        "greige": "#8b8680"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "grid-gap": "16px",
                        "nav-height": "64px",
                        "card-padding": "16px",
                        "btn-height": "36px",
                        "page-padding": "24px",
                        "page-max-width": "1200px",
                        "btn-sm-height": "28px"
                    },
                    "fontFamily": {
                        "section-label": ["Inter"],
                        "card-mono": ["Courier Prime"],
                        "mono-sm": ["Courier Prime"],
                        "mono-md": ["Courier Prime"],
                        "card-title": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "section-label": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "card-mono": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "mono-sm": ["11px", {"lineHeight": "14px", "fontWeight": "400"}],
                        "mono-md": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                        "card-title": ["15px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #faf9f5;
            color: #2d2a26;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-input:focus {
            outline: none;
            border-color: #5f5b56;
            box-shadow: 0 0 0 3px rgba(139, 134, 128, 0.18);
        }
        .custom-radio:checked {
            background-color: #8b8680;
            border-color: #8b8680;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #e4e2dc;
            transition: .4s;
            border-radius: 22px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #8b8680;
        }
        input:checked + .slider:before {
            transform: translateX(22px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- TopNavBar -->
<nav class="bg-surface border-b border-border h-nav-height sticky top-0 z-50">
<div class="flex items-center justify-between px-page-padding h-full max-w-page-max-width mx-auto w-full">
<div class="flex items-center gap-8">
<span class="font-card-title text-card-title font-bold text-text-primary">CPA Key Management</span>
<div class="hidden md:flex gap-6">
<a class="font-body-md text-body-md text-text-muted hover:text-text-primary transition-colors cursor-pointer" href="#">密钥列表</a>
<a class="font-body-md text-body-md text-text-muted hover:text-text-primary transition-colors cursor-pointer" href="#">新建密钥</a>
<a class="font-body-md text-body-md text-primary border-b-2 border-primary pb-[20px] cursor-pointer" href="#">映射</a>
</div>
</div>
<div class="flex items-center gap-4">
<button class="font-body-md text-body-md text-text-muted hover:text-text-primary transition-colors cursor-pointer">退出登录</button>
</div>
</div>
</nav>
<!-- Main Content -->
<main class="flex-grow pt-10 pb-20 px-page-padding">
<div class="max-w-[600px] mx-auto">
<!-- Page Header -->
<div class="flex items-center justify-between mb-6">
<h1 class="font-card-title text-[20px] font-bold text-text-primary">编辑别名</h1>
<a class="flex items-center gap-1 text-greige hover:opacity-80 transition-opacity font-body-md text-body-md" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
<span>返回</span>
</a>
</div>
<!-- Form Card -->
<div class="bg-white border border-border rounded-[10px] p-6 shadow-sm">
<form class="space-y-8">
<!-- 别名名称 -->
<div class="space-y-2">
<label class="block font-section-label text-section-label text-text-muted uppercase">别名名称</label>
<input class="w-full h-[36px] px-3 bg-white border border-border rounded-lg font-card-mono text-mono-md text-text-primary form-input transition-all" placeholder="gpt-4o" type="text" value="gpt-4o-production"/>
</div>
<!-- 调度模式 -->
<div class="space-y-3">
<label class="block font-section-label text-section-label text-text-muted uppercase">调度模式</label>
<div class="grid grid-cols-1 gap-3">
<label class="flex items-start gap-3 p-3 border border-border rounded-lg cursor-pointer hover:bg-row-hover transition-colors group">
<input checked="" class="mt-1 w-4 h-4 text-greige border-border focus:ring-accent-ring custom-radio" name="schedule" type="radio" value="round-robin"/>
<div>
<span class="block font-card-title text-body-md font-semibold text-text-primary">轮询 (Round-robin)</span>
<span class="text-text-muted text-[12px]">在多个可用目标之间循环分配请求，实现负载均衡。</span>
</div>
</label>
<label class="flex items-start gap-3 p-3 border border-border rounded-lg cursor-pointer hover:bg-row-hover transition-colors group">
<input class="mt-1 w-4 h-4 text-greige border-border focus:ring-accent-ring custom-radio" name="schedule" type="radio" value="priority"/>
<div>
<span class="block font-card-title text-body-md font-semibold text-text-primary">优先 (Priority)</span>
<span class="text-text-muted text-[12px]">按顺序尝试目标列表，仅当前面的目标不可用时才使用后续目标。</span>
</div>
</label>
</div>
</div>
<!-- 目标列表 -->
<div class="space-y-3">
<div class="flex items-center justify-between">
<label class="font-section-label text-section-label text-text-muted uppercase">目标列表</label>
<button class="h-btn-sm-height px-3 border border-border rounded-md text-text-muted font-body-md text-[12px] hover:bg-row-hover hover:border-border-hover transition-all flex items-center gap-1" type="button">
<span class="material-symbols-outlined text-[14px]">add</span>
                                添加目标
                            </button>
</div>
<div class="space-y-2">
<!-- Row 1 -->
<div class="flex items-center justify-between p-3 bg-surface-container-low border border-border rounded-lg group">
<span class="font-card-mono text-mono-md text-text-primary">openai · gpt-4o · team</span>
<button class="text-text-muted hover:text-danger transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
<!-- Row 2 -->
<div class="flex items-center justify-between p-3 bg-surface-container-low border border-border rounded-lg group">
<span class="font-card-mono text-mono-md text-text-primary">anthropic · claude-3-5-sonnet · custom</span>
<button class="text-text-muted hover:text-danger transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
</div>
</div>
<!-- 计费模式 -->
<div class="space-y-4 pt-4 border-t border-border">
<div class="flex items-center justify-between">
<label class="font-section-label text-section-label text-text-muted uppercase">计费模式</label>
<div class="flex items-center gap-3">
<span class="font-body-md text-[12px] text-primary font-semibold">tokens</span>
<label class="switch">
<input id="billing-toggle" type="checkbox"/>
<span class="slider"></span>
</label>
<span class="font-body-md text-[12px] text-text-muted">per_call</span>
</div>
</div>
<!-- Price Inputs (Visible when 'tokens' is selected) -->
<div class="grid grid-cols-3 gap-4 animate-in fade-in duration-300" id="token-pricing">
<div class="space-y-1">
<label class="block text-[11px] text-text-muted">输入 (Input)</label>
<div class="relative">
<input class="w-full h-[32px] pl-3 pr-8 border border-border rounded-md font-card-mono text-mono-md text-text-primary form-input" type="text" value="0.15"/>
<span class="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-text-muted font-card-mono">/1M</span>
</div>
</div>
<div class="space-y-1">
<label class="block text-[11px] text-text-muted">输出 (Output)</label>
<div class="relative">
<input class="w-full h-[32px] pl-3 pr-8 border border-border rounded-md font-card-mono text-mono-md text-text-primary form-input" type="text" value="0.60"/>
<span class="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-text-muted font-card-mono">/1M</span>
</div>
</div>
<div class="space-y-1">
<label class="block text-[11px] text-text-muted">缓存 (Cache)</label>
<div class="relative">
<input class="w-full h-[32px] pl-3 pr-8 border border-border rounded-md font-card-mono text-mono-md text-text-primary form-input" type="text" value="0.08"/>
<span class="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-text-muted font-card-mono">/1M</span>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="flex items-center gap-3 pt-6">
<button class="h-btn-height px-8 bg-greige text-white rounded-lg font-card-title text-body-md font-semibold hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                            保存
                        </button>
<button class="h-btn-height px-8 bg-transparent border border-border text-text-muted rounded-lg font-card-title text-body-md hover:bg-row-hover hover:border-border-hover transition-all" type="button">
                            取消
                        </button>
</div>
</form>
</div>
<!-- Warning Tooltip (Atmospheric) -->
<div class="mt-6 flex items-start gap-3 p-4 bg-warn/5 border border-warn/20 rounded-lg">
<span class="material-symbols-outlined text-warn text-[20px]">info</span>
<p class="text-[12px] text-text-muted leading-relaxed">
                    更改别名配置将立即影响所有正在调用此别名的客户端。请确保目标列表中的模型版本与预期业务逻辑一致。计费模式的调整不会追溯已完成的交易。
                </p>
</div>
</div>
</main>
<script>
        // Micro-interaction for the billing toggle
        const toggle = document.getElementById('billing-toggle');
        const tokenSection = document.getElementById('token-pricing');
        
        toggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                // 'per_call' mode - hide prices for demonstration
                tokenSection.style.opacity = '0.3';
                tokenSection.style.pointerEvents = 'none';
                tokenSection.style.filter = 'grayscale(1)';
            } else {
                // 'tokens' mode - active
                tokenSection.style.opacity = '1';
                tokenSection.style.pointerEvents = 'auto';
                tokenSection.style.filter = 'none';
            }
        });
    </script>
</body></html>
