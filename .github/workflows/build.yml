name: Build

on:
  pull_request:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_ID: cpa-key-policy

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Web build (embed UI)
        run: make web-build

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
            ext: so
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: so
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            ext: dylib
          - goos: darwin
            goarch: arm64
            runner: macos-15
            ext: dylib
          - goos: windows
            goarch: amd64
            runner: windows-2025
            ext: dll
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Web build (embed UI)
        run: make web-build

      - name: Resolve release metadata
        run: bash scripts/release-metadata.sh ${{ matrix.goos }} ${{ matrix.goarch }} ${{ matrix.ext }}

      - name: Build shared library
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -buildvcs=false -tags cshared -buildmode=c-shared \
              -ldflags "-s -w" \
              -o "dist/${LIB_NAME}" ./cmd/cpa-key-policy
          rm -f "dist/${PLUGIN_ID}.h"

      - name: Package plugin
        run: bash scripts/package-plugin.sh dist "${LIB_NAME}" "${ARCHIVE_NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error

  build-windows-arm64:
    name: Build windows/arm64
    needs: test
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Web build (embed UI)
        run: make web-build

      - name: Resolve release metadata
        id: release_metadata
        run: bash scripts/release-metadata.sh windows arm64 dll

      - name: Build Windows ARM64 shared library
        timeout-minutes: 45
        uses: go-cross/cgo-actions@v1
        env:
          GOFLAGS: -trimpath -buildmode=c-shared
        with:
          dir: ./cmd/cpa-key-policy
          packages: .
          targets: windows-arm64
          out-dir: dist/windows-arm64
          output: ${{ env.PLUGIN_ID }}.dll
          flags: -ldflags=-s -w

      - name: Package plugin
        run: bash scripts/package-plugin.sh dist/windows-arm64 "${PLUGIN_ID}.dll" "${ARCHIVE_NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
      - build-windows-arm64
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          sort dist/*.sha256 > dist/checksums.txt
          awk 'NF != 2 || $1 !~ /^[0-9a-fA-F]{64}$/ { print "invalid checksum line " NR ": " $0; bad=1 } END { exit bad }' dist/checksums.txt
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.zip dist/checksums.txt --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.zip dist/checksums.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated release for ${GITHUB_REF_NAME}. See README for capabilities and configuration."
          fi