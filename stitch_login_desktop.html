<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Courier+Prime&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#1c1b1e",
                        "primary": "#8B8680", /* Primary Greige from Style Guidance */
                        "border": "#E3E1DB",
                        "on-tertiary-fixed-variant": "#474649",
                        "secondary": "#5f5f5a",
                        "primary-container": "#78746e",
                        "on-secondary-container": "#656560",
                        "surface": "#FFFFFF",
                        "success": "#10B981",
                        "on-surface-variant": "#4b463f",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "text-primary": "#2D2A26",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#ccc5bf",
                        "on-secondary-fixed": "#1b1c18",
                        "outline": "#7c766e",
                        "primary-fixed": "#e8e1da",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1c1b1b",
                        "text-muted": "#6D6760",
                        "on-primary-fixed": "#1e1b17",
                        "surface-variant": "#e6e2e0",
                        "surface-container-highest": "#e6e2e0",
                        "on-primary-container": "#fffbff",
                        "tertiary-fixed": "#e5e1e5",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#4a4641",
                        "surface-dim": "#ddd9d8",
                        "danger": "#C65746",
                        "secondary-container": "#e4e2dc",
                        "on-error-container": "#93000a",
                        "surface-tint": "#625e58",
                        "tertiary-container": "#767477",
                        "tertiary": "#5d5b5e",
                        "page-bg": "#FAF9F5",
                        "inverse-on-surface": "#f4f0ee",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1c1b1b",
                        "surface-container": "#f1edeb",
                        "surface-container-low": "#f7f3f1",
                        "on-tertiary-container": "#fffbff",
                        "secondary-fixed-dim": "#c8c6c1",
                        "on-secondary-fixed-variant": "#474743",
                        "inverse-primary": "#ccc5bf",
                        "surface-bright": "#fdf8f7",
                        "outline-variant": "#cdc5bc",
                        "border-strong": "#D5D2CB",
                        "background": "#fdf8f7",
                        "error": "#ba1a1a",
                        "warning": "#E0AA14",
                        "inverse-surface": "#31302f",
                        "surface-container-high": "#ebe7e6",
                        "secondary-fixed": "#e4e2dc",
                        "tertiary-fixed-dim": "#c8c5c9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "card-title": ["Inter"],
                        "nav-title": ["Inter"],
                        "nav-subtitle": ["Inter"],
                        "card-secondary-mono": ["Courier Prime"],
                        "section-label": ["Inter"],
                        "body": ["Inter"]
                    },
                    "fontSize": {
                        "card-title": ["15px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "nav-title": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "nav-subtitle": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "card-secondary-mono": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "section-label": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "body": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #FAF9F5;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .accent-ring:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(139, 134, 128, 0.18);
            border-color: #8B8680;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-page-bg min-h-screen flex items-center justify-center p-page-padding">
<div class="w-full max-w-[460px] flex flex-col items-center">
<!-- Identity Block -->
<header class="mb-8 text-center">
<h1 class="font-nav-title text-card-title text-text-primary mb-1 tracking-tight">cpa-key-policy 管理面板</h1>
<p class="font-body text-[13px] text-text-muted">登录到 CLIProxyAPI</p>
</header>
<!-- Login Card -->
<main class="w-full bg-surface border border-border rounded-[10px] p-8 shadow-sm">
<form class="space-y-6" id="loginForm">
<!-- Field 1: CPA Address -->
<div class="space-y-1.5">
<label class="block font-section-label text-section-label text-text-muted uppercase" for="baseUrl">
                        CPA 地址 (Base URL)
                    </label>
<div class="relative">
<input class="w-full h-[36px] px-3 font-card-secondary-mono text-card-secondary-mono border border-border rounded-[6px] bg-page-bg text-text-primary accent-ring transition-all duration-200" id="baseUrl" required="" type="text" value="http://127.0.0.1:8317"/>
</div>
</div>
<!-- Field 2: Management Key -->
<div class="space-y-1.5">
<label class="block font-section-label text-section-label text-text-muted uppercase" for="managementKey">
                        Management Key (CPA secret-key)
                    </label>
<div class="relative">
<input class="w-full h-[36px] px-3 font-card-secondary-mono text-card-secondary-mono border border-border rounded-[6px] bg-page-bg text-text-primary accent-ring transition-all duration-200 placeholder:text-text-muted/40" id="managementKey" placeholder="remote-management.secret-key" required="" type="password"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 text-text-muted hover:text-primary transition-colors cursor-pointer" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[18px]" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[40px] bg-primary hover:bg-on-surface-variant text-on-primary font-body font-semibold rounded-[6px] transition-all duration-200 active:scale-[0.98] cursor-pointer flex items-center justify-center gap-2" type="submit">
                    登录
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Security Notes -->
<footer class="mt-8 pt-6 border-t border-border space-y-3">
<div class="flex gap-3">
<span class="material-symbols-outlined text-text-muted text-[16px] mt-0.5" style="font-variation-settings: 'wght' 300;">memory</span>
<p class="font-body text-[12px] text-text-muted leading-relaxed">
                        key 仅存在内存中，关闭/刷新页面即失效，不会写入本地存储。
                    </p>
</div>
<div class="flex gap-3">
<span class="material-symbols-outlined text-text-muted text-[16px] mt-0.5" style="font-variation-settings: 'wght' 300;">info</span>
<p class="font-body text-[12px] text-text-muted leading-relaxed">
                        未从面板读取到已保存的 management key（可能未勾选“记住密码”），请手动输入。
                    </p>
</div>
</footer>
</main>
<!-- Aesthetic Decoration (Subtle) -->
<div class="mt-12 flex items-center gap-2 opacity-30">
<div class="h-px w-8 bg-border"></div>
<span class="material-symbols-outlined text-[14px]">shield_person</span>
<div class="h-px w-8 bg-border"></div>
</div>
</div>
<script>
        function togglePassword() {
            const input = document.getElementById('managementKey');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Micro-interaction for login
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined text-[18px]">progress_activity</span> 验证中...`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined text-[18px]">check_circle</span> 已登录`;
                btn.classList.replace('bg-primary', 'bg-success');
                
                // Simulate navigation delay
                setTimeout(() => {
                    // Logic for redirection would go here
                    console.log('Login successful');
                }, 1000);
            }, 1500);
        });
    </script>
</body></html>
