<script>
        // Micro-interactions for chip toggling
        document.querySelectorAll('label input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const parent = this.closest('label');
                const isChecked = this.checked;
                
                if (isChecked) {
                    parent.classList.remove('bg-surface-container-low', 'text-text-muted');
                    parent.classList.add('bg-accent', 'text-white');
                    
                    // Add checkmark if not already present
                    if (!parent.querySelector('.material-symbols-outlined')) {
                        const icon = document.createElement('span');
                        icon.className = 'material-symbols-outlined text-[16px]';
                        icon.style.fontVariationSettings = "'FILL' 1";
                        icon.textContent = 'check_circle';
                        parent.prepend(icon);
                    }
                } else {
                    parent.classList.add('bg-surface-container-low', 'text-text-muted');
                    parent.classList.remove('bg-accent', 'text-white');
                    const icon = parent.querySelector('.material-symbols-outlined');
                    if (icon) icon.remove();
                }
                
                updateSelectionCount();
            });
        });

        function updateSelectionCount() {
            const count = document.querySelectorAll('label input[type="checkbox"]:checked').length;
            const countDisplays = document.querySelectorAll('.selection-count-text'); // If we had more, we'd use this
            
            // For now updating specific static areas
            document.querySelector('h1 + p').innerText = `已选 ${count} 个模型 · 别名将自动等于模型名`;
            document.querySelectorAll('button').forEach(btn => {
                if (btn.innerText.includes('完成')) {
                    btn.innerText = `完成（已选 ${count}）`;
                }
            });
            document.querySelector('footer .text-text-muted').innerText = `已选 ${count}`;
        }
    </script>
