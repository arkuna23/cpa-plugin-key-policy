# Example CLIProxyAPI snippet for cpa-key-policy.
# Replace placeholders. Do not commit real secrets or production hosts.

plugins:
  enabled: true
  dir: "plugins"
  configs:
    cpa-key-policy:
      enabled: true
      priority: 10
      # Runtime source of truth once created (keys, aliases, classify rules, usage).
      state_file: "cpa-key-policy-state.json"

      # Prefer creating keys/aliases/classify rules via Web UI or Management API.
      # Seed keys below are mainly for first boot when state_file does not exist.
      keys:
        - id: "team-a"
          name: "Team A"
          enabled: true
          key_hash: "sha256:replace-with-hash"
          key_preview: "cpa_abc...xyz"
          rpm: 60
          # periodic (default): enforce daily + weekly limits.
          # fixed: enforce one cumulative limit until explicitly reset.
          quota_mode: "periodic"
          fixed_limit_usd: 0
          daily_limit_usd: 10
          weekly_limit_usd: 50
          # Either bind models directly…
          models:
            - alias: "fast"
              provider: "codex"
              target_model: "gpt-5.4-mini"
              group: "free" # built-in tier; custom groups use classify:name
            - alias: "compat-demo"
              provider: "cerebras" # openai-compatibility channel name
              target_model: "gpt-oss-120b"
          # …or reference global aliases created in the UI / POST /aliases:
          # aliases:
          #   - alias: "cheap-chat"
