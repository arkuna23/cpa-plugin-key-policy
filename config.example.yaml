plugins:
  enabled: true
  dir: "plugins"
  configs:
    cpa-key-policy:
      enabled: true
      priority: 10
      state_file: "cpa-key-policy-state.json"
      keys:
        - id: "team-a"
          name: "Team A"
          enabled: true
          key_hash: "sha256:replace-with-hash"
          key_preview: "cpa_abc...xyz"
          rpm: 60
          models:
            - alias: "fast"
              provider: "codex"
              target_model: "gpt-5-codex"
            - alias: "sonnet"
              provider: "claude"
              target_model: "claude-sonnet-4-5-20250929"
