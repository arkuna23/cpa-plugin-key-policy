plugins:
  enabled: true
  dir: "plugins"
  configs:
    cpa-key-policy:
      enabled: true
      priority: 10
      state_file: "cpa-key-policy-state.json"
      sidecar:
        enabled: false
        listen: "127.0.0.1:19090"
        upstream: "http://127.0.0.1:8317"
        # Strongly recommended: a CPA key that can read the global /v1/models
        # list on the upstream. Downstream cpa_ keys still control client access.
        models_api_key: "replace-with-cpa-api-key-that-can-list-models"
      keys:
        - id: "team-a"
          name: "Team A"
          enabled: true
          key_hash: "sha256:replace-with-hash"
          key_preview: "cpa_abc...xyz"
          rpm: 60
          models:
            - alias: "fast"
              provider: "codex"
              target_model: "gpt-5-codex"
            - alias: "sonnet"
              provider: "claude"
              target_model: "claude-sonnet-4-5-20250929"
